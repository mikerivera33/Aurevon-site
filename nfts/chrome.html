<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUREVON CHROME PASS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0f;font-family:'Space Grotesk',sans-serif;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(100,180,255,0.08) 0%,transparent 70%);pointer-events:none;}
  .nft-container{perspective:1200px;width:340px;height:560px;}
  .nft-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;animation:spin3d 10s linear infinite;border-radius:20px;cursor:pointer;}
  @keyframes spin3d{0%{transform:rotateY(0deg) rotateX(5deg);}50%{transform:rotateY(180deg) rotateX(-5deg);}100%{transform:rotateY(360deg) rotateX(5deg);}}
  .nft-card .front,.nft-card .back{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;overflow:hidden;}
  .nft-card .back{transform:rotateY(180deg);}
  .front{background:linear-gradient(145deg,#1a2a3a 0%,#0d1b2a 40%,#1a2a3a 100%);border:1px solid rgba(100,180,255,0.3);box-shadow:0 0 40px rgba(100,180,255,0.15),0 0 80px rgba(100,180,255,0.05),inset 0 1px 0 rgba(255,255,255,0.15);}
  .front::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 50%,rgba(100,180,255,0.08) 100%);pointer-events:none;border-radius:20px;}
  .front::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent 0deg,rgba(100,180,255,0.06) 60deg,rgba(200,230,255,0.12) 120deg,transparent 180deg,rgba(100,180,255,0.06) 240deg,transparent 360deg);animation:chromeSweep 6s linear infinite;pointer-events:none;}
  @keyframes chromeSweep{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
  .header{position:absolute;top:24px;left:24px;right:24px;display:flex;justify-content:space-between;align-items:flex-start;z-index:2;}
  .logo-text{font-size:11px;font-weight:700;letter-spacing:3px;color:rgba(200,230,255,0.9);text-transform:uppercase;}
  .sub-links{font-size:7px;letter-spacing:2px;color:rgba(150,200,255,0.5);margin-top:3px;}
  .shield{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:90px;height:90px;background:linear-gradient(135deg,rgba(100,180,255,0.2),rgba(50,130,220,0.1));border:1px solid rgba(100,180,255,0.4);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);box-shadow:0 0 30px rgba(100,180,255,0.3),inset 0 0 20px rgba(100,180,255,0.1);}
  .bg-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;font-weight:900;color:rgba(100,180,255,0.05);letter-spacing:-4px;user-select:none;white-space:nowrap;}
  .tag{position:absolute;top:170px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:4px;color:rgba(100,180,255,0.6);text-transform:uppercase;border:1px solid rgba(100,180,255,0.3);padding:3px 12px;border-radius:20px;background:rgba(100,180,255,0.05);}
  .title{position:absolute;top:195px;left:50%;transform:translateX(-50%);font-size:32px;font-weight:700;letter-spacing:6px;color:#a8d8ff;text-align:center;white-space:nowrap;text-shadow:0 0 20px rgba(100,180,255,0.5);}
  .subtitle{position:absolute;top:236px;left:50%;transform:translateX(-50%);font-size:8px;letter-spacing:2px;color:rgba(150,200,255,0.6);white-space:nowrap;text-align:center;}
  .divider{position:absolute;top:260px;left:24px;right:24px;height:1px;background:linear-gradient(90deg,transparent,rgba(100,180,255,0.4),transparent);}
  .price{position:absolute;top:272px;left:50%;transform:translateX(-50%);font-size:22px;font-weight:700;color:#a8d8ff;letter-spacing:2px;text-shadow:0 0 15px rgba(100,180,255,0.4);}
  .price-desc{position:absolute;top:302px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(150,200,255,0.5);white-space:nowrap;letter-spacing:1px;}
  .on-chain{position:absolute;top:330px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:2px;color:rgba(100,180,255,0.5);white-space:nowrap;}
  .badges{position:absolute;top:355px;left:24px;right:24px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
  .badge{font-size:7px;letter-spacing:2px;color:rgba(150,200,255,0.7);border:1px solid rgba(100,180,255,0.25);padding:4px 10px;border-radius:20px;background:rgba(100,180,255,0.06);text-transform:uppercase;}
  .barcode{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:120px;height:24px;background:repeating-linear-gradient(90deg,rgba(100,180,255,0.6) 0px,rgba(100,180,255,0.6) 2px,transparent 2px,transparent 4px,rgba(100,180,255,0.4) 4px,rgba(100,180,255,0.4) 5px,transparent 5px,transparent 7px);opacity:0.4;}
  .qr-placeholder{position:absolute;bottom:50px;right:28px;width:30px;height:30px;border:1px solid rgba(100,180,255,0.3);display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;padding:3px;}
  .qr-placeholder::before,.qr-placeholder::after{content:'';background:rgba(100,180,255,0.5);}
  .footer{position:absolute;bottom:20px;left:24px;right:24px;display:flex;justify-content:space-between;align-items:center;}
  .footer-text{font-size:6px;letter-spacing:2px;color:rgba(100,180,255,0.3);text-transform:uppercase;}
  .back{background:linear-gradient(145deg,#0d1b2a 0%,#1a2a3a 100%);border:1px solid rgba(100,180,255,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  .back .logo-text{font-size:14px;letter-spacing:4px;color:rgba(150,200,255,0.8);}
  .back .shield{position:relative;top:auto;left:auto;transform:none;width:70px;height:70px;}
  .back .bg-text{font-size:60px;color:rgba(100,180,255,0.04);position:relative;top:auto;left:auto;transform:none;}
  .back .footer-text{font-size:7px;letter-spacing:3px;color:rgba(100,180,255,0.3);}
</style>
</head>
<body>
<div class="nft-container">
  <div class="nft-card">
    <div class="front">
      <div class="header">
        <div>
          <div class="logo-text">AUREVON</div>
          <div class="sub-links">SYSTEMS &middot; CAPITAL &middot; VENTURES</div>
        </div>
      </div>
      <div class="shield"></div>
      <div class="bg-text">CHR</div>
      <div class="tag">TIER 2</div>
      <div class="title">CHROME</div>
      <div class="subtitle">RE ACCESS &middot; PRIORITY SUPPORT</div>
      <div class="divider"></div>
      <div class="price">$150</div>
      <div class="price-desc">Standalone &middot; Upgradeable to Full Package</div>
      <div style="font-size:7px;color:rgba(100,180,255,0.3);text-align:center;position:absolute;top:318px;left:0;right:0;margin:auto;">ON-CHAIN &middot; BASE (ETH L2)</div>
      <div class="badges">
        <div class="badge">RE PLATFORM</div>
        <div class="badge">PRIORITY QUEUE</div>
        <div class="badge">CHROME EMBLEM</div>
      </div>
      <div class="barcode"></div>
      <div style="font-size:7px;color:rgba(100,180,255,0.3);position:absolute;bottom:78px;left:28px;letter-spacing:2px;">AUREVON-CHR-2026</div>
      <div class="qr-placeholder"></div>
      <div class="footer">
        <div class="footer-text">AUREVON GROUP LLC &middot; 2026 GENESIS</div>
        <div class="footer-text">CHROME</div>
      </div>
    </div>
    <div class="nft-card back">
      <div class="header"><div class="logo-text">AUREVON</div></div>
      <div class="shield" style="transform:scale(1.4);margin-top:20px;"></div>
      <div class="bg-text">CHR</div>
      <div class="footer"><div class="footer-text">SECURE ENCLAVE</div></div>
    </div>
  </div>
</div>
</body>
</html>
