<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--panel:#111827;--panel2:#1e1e21;
  --t1:#f0ede8;--t2:#b8b3ab;--t3:#6b6760;
  --acc1:#1E3A8A;--acc2:#3B82F6;
  --acc:linear-gradient(135deg,#1E3A8A,#3B82F6);
  --sb:220px;--tb:56px;--r:10px;
}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5}
h1,h2,h3{font-family:'Archivo Black',sans-serif}
a{color:var(--acc1);text-decoration:none}

/* LAYOUT */
#sidebar{position:fixed;top:0;left:0;width:var(--sb);height:100vh;background:var(--panel);border-right:1px solid #2a2a2e;display:flex;flex-direction:column;z-index:100;transition:width .25s}
#sidebar.collapsed{width:56px}
#sidebar.collapsed .nav-label{display:none}
#sidebar.collapsed .logo-text{display:none}
#sidebar.collapsed #sidebar-logo{justify-content:center;padding:0 10px}

#topbar{position:fixed;top:0;left:var(--sb);right:0;height:var(--tb);background:var(--panel);border-bottom:1px solid #2a2a2e;display:flex;align-items:center;gap:12px;padding:0 20px;z-index:99;transition:left .25s}
#topbar.collapsed{left:56px}

#main{margin-left:var(--sb);margin-top:var(--tb);padding:24px;min-height:calc(100vh - var(--tb));transition:margin-left .25s}
#main.collapsed{margin-left:56px}

/* SIDEBAR */
#sidebar-logo{display:flex;align-items:center;gap:10px;padding:12px 16px;height:var(--tb);border-bottom:1px solid #2a2a2e}
.logo-text{font-family:'Archivo Black',sans-serif;font-size:16px;background:var(--acc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav{flex:1;overflow-y:auto;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-radius:8px;margin:2px 8px;color:var(--t2);transition:all .15s;white-space:nowrap}
.nav-item:hover{background:var(--panel2);color:var(--t1)}
.nav-item.active{background:linear-gradient(135deg,rgba(30,58,138,.15),rgba(59,130,246,.15));color:var(--acc1);border-left:2px solid var(--acc1);margin-left:6px}
.nav-icon{font-size:16px;min-width:20px;text-align:center}

#sidebar-footer{padding:12px 16px;border-top:1px solid #2a2a2e;font-size:12px;color:var(--t3)}

/* TOPBAR */
.topbar-title{font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--t1);white-space:nowrap}
#search-input{background:var(--panel2);border:1px solid #2a2a2e;border-radius:8px;color:var(--t1);padding:6px 12px;font-size:13px;width:220px;outline:none}
#search-input:focus{border-color:var(--acc1)}
.topbar-spacer{flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-acc{background:var(--acc);color:#fff}
.btn-acc:hover{opacity:.85}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid #2a2a2e}
.btn-ghost:hover{background:var(--panel2);color:var(--t1)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:rgba(220,50,50,.15);color:#f06060;border:1px solid rgba(220,50,50,.2)}
.btn-danger:hover{background:rgba(220,50,50,.25)}

/* CARDS */
.card{background:var(--panel);border:1px solid #2a2a2e;border-radius:var(--r);padding:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}

.kpi-card{background:var(--panel);border:1px solid #2a2a2e;border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc)}
.kpi-label{font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.kpi-value{font-family:'Archivo Black',sans-serif;font-size:28px;color:var(--t1)}
.kpi-sub{font-size:12px;color:var(--t3);margin-top:4px}

/* TABLES */
.table-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid #2a2a2e}
table{width:100%;border-collapse:collapse}
thead th{background:var(--panel2);color:var(--t3);font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:10px 14px;text-align:left;cursor:pointer;white-space:nowrap;user-select:none}
thead th:hover{color:var(--t1)}
tbody tr{border-top:1px solid #1e1e21;transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody tr.expanded-parent{background:rgba(30,58,138,.06)}
td{padding:10px 14px;color:var(--t2);font-size:13px}
td.td-primary{color:var(--t1);font-weight:500}
.expand-row td{padding:0}
.expand-inner{padding:20px;background:var(--panel2);border-top:1px solid #2a2a2e}

/* PILLS */
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.pill-green{background:rgba(34,197,94,.15);color:#4ade80}
.pill-orange{background:rgba(59,130,246,.15);color:#3B82F6}
.pill-red{background:rgba(220,50,50,.15);color:#f06060}
.pill-blue{background:rgba(59,130,246,.15);color:#60a5fa}
.pill-purple{background:rgba(168,85,247,.15);color:#c084fc}
.pill-gray{background:rgba(107,103,96,.15);color:var(--t3)}
.pill-acc{background:linear-gradient(135deg,rgba(30,58,138,.2),rgba(59,130,246,.2));color:var(--acc2)}

/* FILTERS */
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-select{background:var(--panel2);border:1px solid #2a2a2e;border-radius:8px;color:var(--t2);padding:6px 10px;font-size:13px;outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--acc1)}

/* ACTIVITY FEED */
.feed-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #1e1e21}
.feed-item:last-child{border-bottom:none}
.feed-dot{width:8px;height:8px;border-radius:50%;background:var(--acc1);margin-top:6px;flex-shrink:0}
.feed-dot.green{background:#4ade80}
.feed-dot.blue{background:#60a5fa}
.feed-meta{font-size:11px;color:var(--t3);margin-top:2px}

/* CHART */
.chart-container{height:260px}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.section-title{font-size:20px;color:var(--t1)}

/* SETTINGS */
.settings-group{margin-bottom:24px}
.settings-group h3{font-size:14px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #2a2a2e}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px}
.form-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px}
.form-label{font-size:12px;color:var(--t3)}
.form-input{background:var(--panel2);border:1px solid #2a2a2e;border-radius:8px;color:var(--t1);padding:8px 12px;font-size:13px;outline:none;width:100%}
.form-input:focus{border-color:var(--acc1)}
.quick-links{display:flex;flex-wrap:wrap;gap:8px}
.quick-link{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--panel2);border:1px solid #2a2a2e;border-radius:8px;color:var(--t2);font-size:13px;cursor:pointer;transition:all .15s;text-decoration:none}
.quick-link:hover{background:#2a2a2e;color:var(--t1)}

/* EXPORT BTNS */
.export-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}

/* STATUS DROPDOWN */
.status-select{background:transparent;border:none;cursor:pointer;font-size:11px;font-weight:600;text-transform:uppercase;outline:none;padding:0}

/* LOADING/ERROR */
#loading-overlay{position:fixed;inset:0;background:rgba(12,12,14,.8);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid #2a2a2e;border-top-color:var(--acc1);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--panel);border:1px solid #2a2a2e;border-radius:10px;padding:12px 18px;font-size:13px;color:var(--t1);z-index:1000;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-left:3px solid #4ade80}
.toast.error{border-left:3px solid #f06060}

/* SUMMARY ROW */
.summary-row{background:var(--panel2);border-top:2px solid #2a2a2e}
.summary-row td{color:var(--t1);font-weight:600}

/* EXPAND ROW DETAILS */
.detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.detail-field{display:flex;flex-direction:column;gap:2px}
.detail-label{font-size:11px;color:var(--t3);text-transform:uppercase}
.detail-value{font-size:13px;color:var(--t1)}
.notes-area{width:100%;background:var(--panel);border:1px solid #2a2a2e;border-radius:8px;color:var(--t1);padding:10px;font-size:13px;font-family:'DM Sans',sans-serif;resize:vertical;min-height:80px;outline:none}
.notes-area:focus{border-color:var(--acc1)}

/* COLLAPSE BTN */
#collapse-btn{padding:8px 10px;background:transparent;border:none;cursor:pointer;color:var(--t3);font-size:18px;margin-top:auto;margin-bottom:8px;align-self:center}
#collapse-btn:hover{color:var(--t1)}

/* MOBILE */
@media(max-width:768px){
  :root{--sb:56px}
  .nav-label{display:none}
  .logo-text{display:none}
  #sidebar-logo{justify-content:center;padding:0}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .grid-2{grid-template-columns:1fr}
  #search-input{width:140px}
}

<script>
// ─── CONFIG ────────────────────────────────────────────────
const BASE_ID = 'appI9X8vcRcK1QZ1l';
const TABLES = {
  leads:    'tbllVIcSRXdZwofbs',
  payments: 'tbl6KlhM9fIH19W5i',
  nfts:     'tbliXEGJdoEIAJU06',
  comms:    'tblNpcADGBIgHcLtk',
};

const state = {
  view: 'dashboard',
  leads: [], payments: [], nfts: [], comms: [],
  filters: { search: '', status: '', tier: '', method: '', nftType: '' },
  pat: localStorage.getItem('bkt_airtable_pat') || '',
  loading: false,
  sortCol: {}, sortDir: {},
  expanded: {},
};

// ─── UTILITIES ─────────────────────────────────────────────
function f(x) { return x?.fields || {}; }
function fmtDate(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); } catch { return d; }
}
function fmtMoney(v) {
  const n = parseFloat(v) || 0;
  return '$' + n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}
function setLoading(v) {
  state.loading = v;
  document.getElementById('loading-overlay').className = v ? 'show' : '';
}

function statusPill(val) {
  if (!val) return '<span class="pill pill-gray">—</span>';
  const v = String(val).toLowerCase();
  let cls = 'pill-gray';
  if (/active|approv|complet|sent|deliver|success|paid|mint/i.test(v)) cls = 'pill-green';
  else if (/pending|review|progress|processing/i.test(v)) cls = 'pill-orange';
  else if (/reject|fail|cancel|error/i.test(v)) cls = 'pill-red';
  else if (/new|submit|received/i.test(v)) cls = 'pill-blue';
  else if (/vip|platinum|gold|insider/i.test(v)) cls = 'pill-acc';
  else if (/silver|bronze|ember/i.test(v)) cls = 'pill-purple';
  return `<span class="pill ${cls}">${esc(val)}</span>`;
}

function tierPill(val) {
  if (!val) return '<span class="pill pill-gray">—</span>';
  const v = String(val).toLowerCase();
  let cls = 'pill-acc';
  if (/silver|bronze/i.test(v)) cls = 'pill-purple';
  else if (/ember/i.test(v)) cls = 'pill-orange';
  return `<span class="pill ${cls}">${esc(val)}</span>`;
}

function methodPill(val) {
  if (!val) return '<span class="pill pill-gray">—</span>';
  const v = String(val).toLowerCase();
  let cls = 'pill-blue';
  if (/stripe|card/i.test(v)) cls = 'pill-green';
  else if (/crypto|eth|btc|sol/i.test(v)) cls = 'pill-purple';
  else if (/cash|wire/i.test(v)) cls = 'pill-orange';
  return `<span class="pill ${cls}">${esc(val)}</span>`;
}

// ─���─ FETCH ──────────────────────────────────────────────────
async function fetchTable(tableId, params = '') {
  if (!state.pat) throw new Error('No PAT configured. Go to Settings.');
  const url = `https://api.airtable.com/v0/${BASE_ID}/${tableId}?${params}`;
  const r = await fetch(url, { headers: { Authorization: `Bearer ${state.pat}` } });
  if (!r.ok) throw new Error(`HTTP ${r.status} – ${r.statusText}`);
  const d = await r.json();
  let records = d.records || [];
  // paginate
  let offset = d.offset;
  while (offset) {
    const r2 = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${tableId}?offset=${offset}`, { headers: { Authorization: `Bearer ${state.pat}` } });
    const d2 = await r2.json();
    records = records.concat(d2.records || []);
    offset = d2.offset;
  }
  return records;
}

async function patchRecord(tableId, recordId, fields) {
  if (!state.pat) { showToast('No PAT configured', 'error'); return; }
  const r = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${tableId}/${recordId}`, {
    method: 'PATCH',
    headers: { Authorization: `Bearer ${state.pat}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields }),
  });
  if (!r.ok) throw new Error(`PATCH failed: HTTP ${r.status}`);
  return await r.json();
}

async function refreshAll() {
  if (!state.pat) { state.view = 'settings'; render(); showToast('Configure your PAT in Settings', 'error'); return; }
  setLoading(true);
  try {
    const [leads, payments, nfts, comms] = await Promise.all([
      fetchTable(TABLES.leads),
      fetchTable(TABLES.payments),
      fetchTable(TABLES.nfts),
      fetchTable(TABLES.comms),
    ]);
    state.leads = leads; state.payments = payments; state.nfts = nfts; state.comms = comms;
    showToast(`Loaded: ${leads.length} leads, ${payments.length} payments, ${nfts.length} NFTs`);
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
  setLoading(false);
  render();
}

// ─── TABLE RENDERER ─────────────────────────────────────────
function renderTable(containerId, columns, rows, opts = {}) {
  const { onRowClick, summaryRow, tableKey } = opts;
  const sort = state.sortCol[tableKey] || '';
  const dir = state.sortDir[tableKey] || 1;
  const el = document.getElementById(containerId);
  if (!el) return;

  const headerHtml = columns.map(c =>
    `<th onclick="sortTable('${tableKey}','${c.key}')">${esc(c.label)} ${sort === c.key ? (dir === 1 ? '▲' : '▼') : ''}</th>`
  ).join('');

  let sorted = [...rows];
  if (sort) {
    sorted.sort((a, b) => {
      const av = a[sort] ?? ''; const bv = b[sort] ?? '';
      return String(av).localeCompare(String(bv), undefined, { numeric: true }) * dir;
    });
  }

  const bodyHtml = sorted.map((row, i) => {
    const cells = columns.map(c => {
      const v = row[c.key];
      if (c.render) return `<td>${c.render(v, row)}</td>`;
      if (c.primary) return `<td class="td-primary">${esc(v)}</td>`;
      return `<td>${esc(v)}</td>`;
    }).join('');
    const rowId = row._id || i;
    const expandClass = state.expanded[rowId] ? 'expanded-parent' : '';
    const expandRows = state.expanded[rowId] && onRowClick ? onRowClick(row) : '';
    return `<tr class="${expandClass}" onclick="toggleExpand('${rowId}','${tableKey}')" style="cursor:${onRowClick?'pointer':'default'}">${cells}</tr>
      ${expandRows ? `<tr class="expand-row" id="expand-${rowId}"><td colspan="${columns.length}"><div class="expand-inner">${expandRows}</div></td></tr>` : ''}`;
  }).join('');

  const sumHtml = summaryRow ? `<tr class="summary-row">${summaryRow.map(c => `<td>${c}</td>`).join('')}</tr>` : '';

  el.innerHTML = `<div class="table-wrap"><table><thead><tr>${headerHtml}</tr></thead><tbody>${bodyHtml}${sumHtml}</tbody></table></div>`;
}

function sortTable(tableKey, col) {
  if (state.sortCol[tableKey] === col) state.sortDir[tableKey] = (state.sortDir[tableKey] || 1) * -1;
  else { state.sortCol[tableKey] = col; state.sortDir[tableKey] = 1; }
  render();
}

function toggleExpand(rowId, tableKey) {
  state.expanded[rowId] = !state.expanded[rowId];
  render();
}

// ─── CHARTS ────────────────────────────────────────────────
const _charts = {};
function initChart(id, option) {
  let chart = _charts[id];
  const el = document.getElementById(id);
  if (!el) return;
  if (chart) chart.dispose();
  chart = echarts.init(el, null, { renderer: 'canvas' });
  chart.setOption(option);
  _charts[id] = chart;
  window.addEventListener('resize', () => chart.resize());
}

function chartTheme(extra = {}) {
  return {
    backgroundColor: 'transparent',
    textStyle: { color: '#b8b3ab', fontFamily: 'DM Sans' },
    ...extra,
  };
}

// ─── NAV ────────────────────────────────────────────────────
function navigate(view) {
  state.view = view;
  state.filters = { search: '', status: '', tier: '', method: '', nftType: '' };
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  render();
}

function onSearch(val) {
  state.filters.search = val.toLowerCase();
  render();
}

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => navigate(el.dataset.view));
});

// Sidebar collapse
const sidebar = document.getElementById('sidebar');
const topbar = document.getElementById('topbar');
const mainEl = document.getElementById('main');
document.getElementById('collapse-btn').addEventListener('click', () => {
  sidebar.classList.toggle('collapsed');
  topbar.classList.toggle('collapsed');
  mainEl.classList.toggle('collapsed');
});

// ─── DASHBOARD ──────────────────────────────────────────────
function renderDashboard() {
  const leads = state.leads; const payments = state.payments; const nfts = state.nfts;

  // KPIs
  const activeLeads = leads.filter(r => !/complet|reject|cancel/i.test(f(r).Status || '')).length;
  const now = new Date(); const mtdStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const mtdRev = payments
    .filter(r => { const d = f(r).Date; return d && new Date(d) >= mtdStart && /paid|complet|success/i.test(f(r).Status || ''); })
    .reduce((s, r) => s + (parseFloat(f(r).Amount) || 0), 0);
  const mintedNfts = nfts.filter(r => /mint|sent|deliver/i.test(f(r).Status || '')).length;
  const deals = leads.filter(r => /complet|deliver/i.test(f(r).Status || '')).length;

  // Revenue last 30 days
  const days30 = Array.from({ length: 30 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (29 - i)); return d.toISOString().slice(0, 10);
  });
  const revByDay = {};
  days30.forEach(d => revByDay[d] = 0);
  payments.forEach(r => {
    const fd = f(r); const d = (fd.Date || '').slice(0, 10);
    if (revByDay[d] !== undefined && /paid|complet|success/i.test(fd.Status || ''))
      revByDay[d] += parseFloat(fd.Amount) || 0;
  });

  // Lead status donut
  const statusCount = {};
  leads.forEach(r => { const s = f(r).Status || 'Unknown'; statusCount[s] = (statusCount[s] || 0) + 1; });
  const donutData = Object.entries(statusCount).map(([n, v]) => ({ name: n, value: v }));

  // Recent activity
  const activity = [
    ...leads.slice(0, 20).map(r => ({ type: 'lead', date: f(r).Submitted || '', label: f(r).Name || 'Unknown', sub: `Lead – ${f(r).Status || 'New'}`, dot: 'blue' })),
    ...payments.slice(0, 20).map(r => ({ type: 'payment', date: f(r).Date || '', label: f(r)['Customer Name'] || f(r)['Customer Email'] || '—', sub: `Payment – ${fmtMoney(f(r).Amount)}`, dot: 'green' })),
  ].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 8);

  const feedHtml = activity.map(a => `
    <div class="feed-item">
      <div class="feed-dot ${a.dot}"></div>
      <div>
        <div style="color:var(--t1);font-weight:500">${esc(a.label)}</div>
        <div class="feed-meta">${esc(a.sub)} · ${fmtDate(a.date)}</div>
      </div>
    </div>`).join('') || '<p style="color:var(--t3);padding:12px">No activity yet. Refresh to load data.</p>';

  document.getElementById('main').innerHTML = `
    <div class="section-header"><h2 class="section-title">Dashboard</h2></div>
    <div class="grid-4">
      <div class="kpi-card"><div class="kpi-label">Active Leads</div><div class="kpi-value">${activeLeads}</div><div class="kpi-sub">Total: ${leads.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">MTD Revenue</div><div class="kpi-value">${fmtMoney(mtdRev)}</div><div class="kpi-sub">${now.toLocaleString('en-US',{month:'long'})} ${now.getFullYear()}</div></div>
      <div class="kpi-card"><div class="kpi-label">NFTs Minted</div><div class="kpi-value">${mintedNfts}</div><div class="kpi-sub">Total: ${nfts.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Deals Delivered</div><div class="kpi-value">${deals}</div><div class="kpi-sub">Completed leads</div></div>
    </div>
    <div class="grid-2">
      <div class="card"><div style="font-weight:600;margin-bottom:12px">Revenue – Last 30 Days</div><div class="chart-container" id="rev-chart"></div></div>
      <div class="card"><div style="font-weight:600;margin-bottom:12px">Lead Status Distribution</div><div class="chart-container" id="donut-chart"></div></div>
    </div>
    <div class="card"><div style="font-weight:600;margin-bottom:12px">Recent Activity</div>${feedHtml}</div>`;

  initChart('rev-chart', {
    ...chartTheme(),
    tooltip: { trigger: 'axis', backgroundColor: '#1e1e21', borderColor: '#2a2a2e', textStyle: { color: '#f0ede8' } },
    xAxis: { type: 'category', data: days30.map(d => d.slice(5)), axisLine: { lineStyle: { color: '#2a2a2e' } }, axisTick: { show: false }, axisLabel: { color: '#6b6760', fontSize: 10, interval: 4 } },
    yAxis: { type: 'value', axisLabel: { color: '#6b6760', formatter: v => '$' + (v >= 1000 ? (v/1000).toFixed(1) + 'k' : v) }, splitLine: { lineStyle: { color: '#1e1e21' } } },
    series: [{ type: 'line', data: days30.map(d => revByDay[d]), smooth: true, symbol: 'none', lineStyle: { color: '#1E3A8A', width: 2 }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(30,58,138,.3)' }, { offset: 1, color: 'rgba(30,58,138,0)' }] } } }],
    grid: { left: 50, right: 16, top: 16, bottom: 32 },
  });

  const PIE_COLORS = ['#1E3A8A','#3B82F6','#60a5fa','#4ade80','#c084fc','#f06060','#6b6760'];
  initChart('donut-chart', {
    ...chartTheme(),
    tooltip: { trigger: 'item', backgroundColor: '#1e1e21', borderColor: '#2a2a2e', textStyle: { color: '#f0ede8' } },
    legend: { bottom: 0, textStyle: { color: '#b8b3ab' }, type: 'scroll' },
    color: PIE_COLORS,
    series: [{ type: 'pie', radius: ['40%','70%'], center: ['50%','45%'], data: donutData, label: { show: false }, emphasis: { scale: true, scaleSize: 6 } }],
  });
}

// ─── LEADS ──────────────────────────────────────────────────
function leadsFilter(leads) {
  const { search, status, tier } = state.filters;
  return leads.filter(r => {
    const fd = f(r);
    if (search && !JSON.stringify(fd).toLowerCase().includes(search)) return false;
    if (status && fd.Status !== status) return false;
    if (tier && fd.Tier !== tier) return false;
    return true;
  });
}

function leadExpandHtml(row) {
  const fd = f(row);
  const linked_payments = state.payments.filter(p => f(p)['Customer Email'] === fd.Email);
  const linked_nfts = state.nfts.filter(n => f(n)['Customer Email'] === fd.Email);

  const fields = [
    ['Name', fd.Name], ['Email', fd.Email], ['Tier', fd.Tier], ['Property Address', fd['Property Address']],
    ['Asset Type', fd['Asset Type']], ['Purchase Price', fmtMoney(fd['Purchase Price'])],
    ['Status', fd.Status], ['Submitted', fmtDate(fd.Submitted)],
    ['Payment Token', fd['Payment Token']], ['Analyst', fd.Analyst],
  ];

  const detailHtml = `<div class="detail-grid">${fields.map(([l, v]) => `<div class="detail-field"><div class="detail-label">${esc(l)}</div><div class="detail-value">${esc(v) || '—'}</div></div>`).join('')}</div>`;

  const pmtHtml = linked_payments.length
    ? `<table style="width:100%;font-size:12px"><tr style="color:var(--t3)">${['Date','Amount','Method','Status'].map(h=>`<th style="text-align:left;padding:4px 8px;font-weight:500">${h}</th>`).join('')}</tr>${linked_payments.map(p => {
        const pf = f(p);
        return `<tr><td style="padding:4px 8px">${fmtDate(pf.Date)}</td><td style="padding:4px 8px">${fmtMoney(pf.Amount)}</td><td style="padding:4px 8px">${methodPill(pf.Method)}</td><td style="padding:4px 8px">${statusPill(pf.Status)}</td></tr>`;
      }).join('')}</table>`
    : '<span style="color:var(--t3);font-size:12px">No linked payments</span>';

  const nftHtml = linked_nfts.length
    ? linked_nfts.map(n => { const nf = f(n); return `<span style="color:var(--t2);font-size:12px;margin-right:12px">${esc(nf['NFT Type']||'NFT')} – ${statusPill(nf.Status)}</span>`; }).join('')
    : '<span style="color:var(--t3);font-size:12px">No linked NFTs</span>';

  return `<div onclick="event.stopPropagation()">
    ${detailHtml}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px">
      <div><div style="font-size:11px;color:var(--t3);text-transform:uppercase;margin-bottom:8px">Linked Payments</div>${pmtHtml}</div>
      <div><div style="font-size:11px;color:var(--t3);text-transform:uppercase;margin-bottom:8px">Linked NFTs</div>${nftHtml}</div>
    </div>
    <div style="font-size:11px;color:var(--t3);text-transform:uppercase;margin-bottom:6px">Notes</div>
    <textarea class="notes-area" id="notes-${row.id}" onblur="saveNotes('${row.id}',this.value)">${esc(fd.Notes||'')}</textarea>
  </div>`;
}

function saveNotes(recordId, val) {
  patchRecord(TABLES.leads, recordId, { Notes: val })
    .then(() => showToast('Notes saved'))
    .catch(e => showToast('Save failed: ' + e.message, 'error'));
}

function changeStatus(tableId, recordId, val) {
  patchRecord(tableId, recordId, { Status: val })
    .then(() => { showToast('Status updated'); refreshAll(); })
    .catch(e => showToast('Update failed: ' + e.message, 'error'));
}

function renderLeads() {
  const allStatuses = [...new Set(state.leads.map(r => f(r).Status).filter(Boolean))];
  const allTiers = [...new Set(state.leads.map(r => f(r).Tier).filter(Boolean))];
  const rows = leadsFilter(state.leads).map(r => ({ _id: r.id, id: r.id, ...f(r) }));

  const cols = [
    { key: 'Name', label: 'Name', primary: true },
    { key: 'Email', label: 'Email' },
    { key: 'Tier', label: 'Tier', render: v => tierPill(v) },
    { key: 'Property Address', label: 'Property' },
    { key: 'Status', label: 'Status', render: (v, row) => `<select class="status-select pill ${statusClass(v)}" onchange="changeStatus('${TABLES.leads}','${row.id}',this.value)" onclick="event.stopPropagation()">
        ${allStatuses.map(s => `<option value="${esc(s)}" ${s===v?'selected':''}>${esc(s)}</option>`).join('')}
      </select>` },
    { key: 'Submitted', label: 'Submitted', render: v => fmtDate(v) },
    { key: 'Analyst', label: 'Analyst' },
  ];

  document.getElementById('main').innerHTML = `
    <div class="section-header"><h2 class="section-title">Leads</h2><span style="color:var(--t3)">${rows.length} records</span></div>
    <div class="filter-bar">
      <input type="text" class="filter-select" style="width:200px" placeholder="Search…" value="${esc(state.filters.search)}" oninput="state.filters.search=this.value.toLowerCase();render()">
      <select class="filter-select" onchange="state.filters.status=this.value;render()">
        <option value="">All Statuses</option>${allStatuses.map(s => `<option value="${esc(s)}" ${state.filters.status===s?'selected':''}>${esc(s)}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="state.filters.tier=this.value;render()">
        <option value="">All Tiers</option>${allTiers.map(s => `<option value="${esc(s)}" ${state.filters.tier===s?'selected':''}>${esc(s)}</option>`).join('')}
      </select>
    </div>
    <div id="leads-table"></div>`;

  renderTable('leads-table', cols, rows, {
    tableKey: 'leads',
    onRowClick: (row) => leadExpandHtml({ id: row.id, id: row.id, fields: row }),
  });
}

function statusClass(v) {
  if (!v) return 'pill-gray';
  if (/active|approv|complet|sent|deliver|success|paid|mint/i.test(v)) return 'pill-green';
  if (/pending|review|progress|processing/i.test(v)) return 'pill-orange';
  if (/reject|fail|cancel|error/i.test(v)) return 'pill-red';
  if (/new|submit|received/i.test(v)) return 'pill-blue';
  return 'pill-gray';
}

// ─── PAYMENTS ───────────────────────────────────────────────
function renderPayments() {
  const allMethods = [...new Set(state.payments.map(r => f(r).Method).filter(Boolean))];
  const allStatuses = [...new Set(state.payments.map(r => f(r).Status).filter(Boolean))];
  const { search, method, status } = state.filters;
  const rows = state.payments.filter(r => {
    const fd = f(r);
    if (search && !JSON.stringify(fd).toLowerCase().includes(search)) return false;
    if (method && fd.Method !== method) return false;
    if (status && fd.Status !== status) return false;
    return true;
  }).map(r => ({ _id: r.id, ...f(r) }));

  const totalAmt = rows.reduce((s, r) => s + (parseFloat(r.Amount) || 0), 0);
  const byMethod = {};
  rows.forEach(r => { const m = r.Method || 'Unknown'; byMethod[m] = (byMethod[m] || 0) + (parseFloat(r.Amount) || 0); });
  const byMethodStr = Object.entries(byMethod).map(([m,v]) => `${m}: ${fmtMoney(v)}`).join(' · ');

  // Monthly chart data
  const currMonth = new Date(); const lastMonth = new Date(); lastMonth.setMonth(lastMonth.getMonth() - 1);
  const cm = currMonth.toISOString().slice(0,7); const lm = lastMonth.toISOString().slice(0,7);
  let cmRev = 0, lmRev = 0;
  state.payments.forEach(r => {
    const fd = f(r); const d = (fd.Date || '').slice(0,7);
    if (/paid|complet|success/i.test(fd.Status || '')) {
      if (d === cm) cmRev += parseFloat(fd.Amount) || 0;
      if (d === lm) lmRev += parseFloat(fd.Amount) || 0;
    }
  });

  const cols = [
    { key: 'Date', label: 'Date', render: v => fmtDate(v) },
    { key: 'Customer Name', label: 'Customer', primary: true },
    { key: 'Customer Email', label: 'Email' },
    { key: 'Tier', label: 'Tier', render: v => tierPill(v) },
    { key: 'Amount', label: 'Amount', render: v => `<span style="color:var(--acc2);font-weight:600">${fmtMoney(v)}</span>` },
    { key: 'Method', label: 'Method', render: v => methodPill(v) },
    { key: 'Status', label: 'Status', render: v => statusPill(v) },
    { key: 'Transaction ID', label: 'Tx ID', render: (v, r) => v ? `<span style="font-family:monospace;font-size:11px;color:var(--t3)" title="${esc(v)}">${String(v).slice(0,12)}…</span>` : '—' },
  ];

  const summaryRow = ['', `<strong>Total: ${rows.length}</strong>`, '', '', `<span style="color:var(--acc2)">${fmtMoney(totalAmt)}</span>`, byMethodStr || '—', '', ''];

  document.getElementById('main').innerHTML = `
    <div class="section-header"><h2 class="section-title">Payments</h2><span style="color:var(--t3)">${rows.length} records</span></div>
    <div class="filter-bar">
      <input type="text" class="filter-select" style="width:200px" placeholder="Search…" value="${esc(state.filters.search)}" oninput="state.filters.search=this.value.toLowerCase();render()">
      <select class="filter-select" onchange="state.filters.method=this.value;render()">
        <option value="">All Methods</option>${allMethods.map(m => `<option value="${esc(m)}" ${state.filters.method===m?'selected':''}>${esc(m)}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="state.filters.status=this.value;render()">
        <option value="">All Statuses</option>${allStatuses.map(s => `<option value="${esc(s)}" ${state.filters.status===s?'selected':''}>${esc(s)}</option>`).join('')}
      </select>
    </div>
    <div class="grid-2" style="margin-bottom:16px">
      <div class="card"><div style="font-weight:600;margin-bottom:12px">This Month vs Last Month</div><div class="chart-container" id="pmt-chart"></div></div>
      <div class="card" style="display:flex;flex-direction:column;gap:12px">
        <div style="font-weight:600">Revenue Summary</div>
        <div class="detail-grid">
          <div class="detail-field"><div class="detail-label">Total Records</div><div class="detail-value" style="font-size:24px">${rows.length}</div></div>
          <div class="detail-field"><div class="detail-label">Total Revenue</div><div class="detail-value" style="font-size:24px;color:var(--acc2)">${fmtMoney(totalAmt)}</div></div>
          <div class="detail-field"><div class="detail-label">This Month</div><div class="detail-value" style="font-size:20px;color:#4ade80">${fmtMoney(cmRev)}</div></div>
          <div class="detail-field"><div class="detail-label">Last Month</div><div class="detail-value" style="font-size:20px">${fmtMoney(lmRev)}</div></div>
        </div>
        <div style="font-size:12px;color:var(--t3)">${byMethodStr || 'No breakdown'}</div>
      </div>
    </div>
    <div id="payments-table"></div>`;

  renderTable('payments-table', cols, rows, { tableKey: 'payments', summaryRow });

  const monthLabels = [lastMonth.toLocaleString('en-US',{month:'short',year:'2-digit'}), currMonth.toLocaleString('en-US',{month:'short',year:'2-digit'})];
  initChart('pmt-chart', {
    ...chartTheme(),
    tooltip: { trigger: 'axis', backgroundColor: '#1e1e21', borderColor: '#2a2a2e', textStyle: { color: '#f0ede8' }, formatter: p => `${p[0].name}: $${p[0].value?.toLocaleString()}` },
    xAxis: { type: 'category', data: monthLabels, axisLabel: { color: '#b8b3ab' }, axisLine: { lineStyle: { color: '#2a2a2e' } } },
    yAxis: { type: 'value', axisLabel: { color: '#6b6760', formatter: v => '$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : v) }, splitLine: { lineStyle: { color: '#1e1e21' } } },
    series: [{ type: 'bar', data: [lmRev, cmRev], barMaxWidth: 60, itemStyle: { borderRadius: [6,6,0,0], color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: '#3B82F6' }, { offset: 1, color: '#1E3A8A' }] } } }],
    grid: { left: 60, right: 16, top: 16, bottom: 36 },
  });
}

// ─── NFTs ────────────────────────────────────────────────────

    { key: 'Wallet', label: 'Wallet', render: v => v ? `<span style="font-family:monospace;font-size:11px;color:var(--t3)" title="${esc(v)}">${String(v).slice(0,12)}…</span>` : '—' },
  ];

  document.getElementById('main').innerHTML = `
    <div class="section-header"><h2 class="section-title">NFT Mints</h2><span style="color:var(--t3)">${rows.length} records</span></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px">${statsHtml || '<span style="color:var(--t3)">No NFT data yet.</span>'}</div>

      <input type="text" class="filter-select" style="width:200px" placeholder="Search…" value="${esc(state.filters.search)}" oninput="state.filters.search=this.value.toLowerCase();render()">
      <select class="filter-select" onchange="state.filters.nftType=this.value;render()">
        <option value="">All Types</option>${allTypes.map(t => `<option value="${esc(t)}" ${state.filters.nftType===t?'selected':''}>${esc(t)}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="state.filters.status=this.value;render()">
        <option value="">All Statuses</option>${allStatuses.map(s => `<option value="${esc(s)}" ${state.filters.status===s?'selected':''}>${esc(s)}</option>`).join('')}
      </select>
    </div>
    <div id="nfts-table"></div>`;

  renderTable('nfts-table', cols, rows, { tableKey: 'nfts' });
}

        <a class="quick-link" href="merch.html">👕 Merch</a>
      </div>
    </div>

    <div class="settings-group">
      <h3>Data Export</h3>
      <div class="export-grid">
        <button class="btn btn-ghost" onclick="exportCSV('leads','Leads')">📥 Export Leads CSV</button>
        <button class="btn btn-ghost" onclick="exportCSV('payments','Payments')">📥 Export Payments CSV</button>
        <button class="btn btn-ghost" onclick="exportCSV('nfts','NFT_Mints')">📥 Export NFTs CSV</button>
        <button class="btn btn-ghost" onclick="exportCSV('comms','Communications')">📥 Export Comms CSV</button>
      </div>
    </div>

    <div class="settings-group">
      <h3>Tables Info</h3>
      <div class="detail-grid">
        <div class="detail-field"><div class="detail-label">Leads</div><div class="detail-value">${state.leads.length} records</div></div>
        <div class="detail-field"><div class="detail-label">Payments</div><div class="detail-value">${state.payments.length} records</div></div>
        <div class="detail-field"><div class="detail-label">NFTs</div><div class="detail-value">${state.nfts.length} records</div></div>
        <div class="detail-field"><div class="detail-label">Communications</div><div class="detail-value">${state.comms.length} records</div></div>
      </div>
    </div>`;
}

function savePat() {
  const val = document.getElementById('pat-input')?.value?.trim() || '';
  state.pat = val;
  localStorage.setItem('bkt_airtable_pat', val);
  showToast('PAT saved');
}

function clearPat() {
  state.pat = '';
  localStorage.removeItem('bkt_airtable_pat');
  const inp = document.getElementById('pat-input');
  if (inp) inp.value = '';
  showToast('PAT cleared');
}

async function testConnection() {
  const statusEl = document.getElementById('conn-status');
  if (statusEl) statusEl.innerHTML = '<span style="color:var(--t2)">Testing…</span>';
  const inp = document.getElementById('pat-input');
  if (inp) state.pat = inp.value.trim();
  try {
    const r = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLES.leads}?maxRecords=1`, {
      headers: { Authorization: `Bearer ${state.pat}` },
    });
    if (r.ok) {
      if (statusEl) statusEl.innerHTML = '<span style="color:#4ade80">✓ Connection successful</span>';
      showToast('Connection successful');
    } else {
      if (statusEl) statusEl.innerHTML = `<span style="color:#f06060">✗ HTTP ${r.status} – check your PAT</span>`;
      showToast(`HTTP ${r.status}`, 'error');
    }
  } catch (e) {
    if (statusEl) statusEl.innerHTML = `<span style="color:#f06060">✗ Error: ${e.message}</span>`;
    showToast('Connection failed', 'error');
  }
}

// ─── CSV EXPORT ─────────────────────────────────────────────
async function exportCSV(key, label) {
  showToast('Fetching data…');
  try {
    let records;
    if (state[key]?.length) records = state[key];
    else records = await fetchTable(TABLES[key]);

    if (!records.length) { showToast('No records to export', 'error'); return; }
    const allKeys = [...new Set(records.flatMap(r => Object.keys(f(r))))];
    const csv = [
      allKeys.join(','),
      ...records.map(r => allKeys.map(k => {
        let v = f(r)[k] ?? '';
        if (Array.isArray(v)) v = v.join('; ');
        return `"${String(v).replace(/"/g, '""')}"`;
      }).join(','))
    ].join('\n');

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `AUREVON_${label.toLowerCase()}_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(`Exported ${records.length} ${label} records`);
  } catch (e) {
    showToast('Export failed: ' + e.message, 'error');
  }
}

// ─── RENDER ─────────────────────────────────────────────────
function render() {
  switch (state.view) {
    case 'dashboard': renderDashboard(); break;
    case 'leads': renderLeads(); break;
    case 'payments': renderPayments(); break;
    case 'nfts': renderNFTs(); break;
    case 'settings': renderSettings(); break;
  }
}

// ─── INIT ────────────────────────────────────────────────────
render();
if (state.pat) refreshAll();
else { render(); }
</script>
