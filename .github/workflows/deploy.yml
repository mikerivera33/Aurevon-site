name: CI — Lint, Validate & Vercel Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate vercel.json
        run: node -e "JSON.parse(require('fs').readFileSync('vercel.json','utf8')); console.log('✓ vercel.json is valid JSON');"

      - name: Count API serverless functions
        run: |
          echo "── Serverless function inventory ──────────────────"
          find api -name '*.js' ! -path 'api/_lib/*' | sort | while read f; do echo "  $f"; done
          COUNT=$(find api -name '*.js' ! -path 'api/_lib/*' | wc -l | tr -d ' ')
          echo "──────────────────────────────────────────────────"
          echo "  Total functions : $COUNT"
          echo "  Vercel Hobby limit: 12"
          if [ "$COUNT" -gt 12 ]; then
            echo "✗ ERROR: $COUNT functions exceeds the 12-function Hobby plan limit!"
            exit 1
          fi
          echo "✓ Function count OK ($COUNT / 12)"

      - name: Validate .env.example exists (secrets audit)
        run: |
          if [ ! -f .env.example ]; then
            echo "✗ .env.example is missing"
            exit 1
          fi
          # Ensure no real secrets are in .env.example (must only contain placeholder values)
          if grep -qE "(sk_live_[a-zA-Z0-9]{20,}|whsec_[a-zA-Z0-9]{20,}|pat[a-zA-Z0-9]{16,}\.[a-zA-Z0-9]{60,})" .env.example; then
            echo "✗ .env.example appears to contain real secrets — remove them!"
            exit 1
          fi
          echo "✓ .env.example looks clean"

  deploy-production:
    name: Deploy Production (main only)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_fWJOrYad78aAg3T4g6SlJ9Xo
      VERCEL_PROJECT_ID: prj_Qbp5AcWi4J6GbvbwtSondxZ0ZRZ0
    steps:
      - uses: actions/checkout@v4

      - name: Check VERCEL_TOKEN
        id: token_check
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠ VERCEL_TOKEN not set — Vercel GitHub integration handles production deployment"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.token_check.outputs.configured == 'true'
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.token_check.outputs.configured == 'true'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.token_check.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Log API function count pre-deploy
        if: steps.token_check.outputs.configured == 'true'
        run: |
          COUNT=$(find api -name '*.js' ! -path 'api/_lib/*' | wc -l | tr -d ' ')
          echo "Deploying with $COUNT serverless functions"

      - name: Deploy to Vercel Production (force cache bust)
        if: steps.token_check.outputs.configured == 'true'
        run: vercel deploy --prod --token=$VERCEL_TOKEN --yes --force

  deploy-preview:
    name: Deploy Preview (PR only)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_fWJOrYad78aAg3T4g6SlJ9Xo
      VERCEL_PROJECT_ID: prj_Qbp5AcWi4J6GbvbwtSondxZ0ZRZ0
    steps:
      - uses: actions/checkout@v4

      - name: Check VERCEL_TOKEN
        id: token_check
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠ VERCEL_TOKEN not set — Vercel GitHub integration handles preview deployment"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.token_check.outputs.configured == 'true'
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.token_check.outputs.configured == 'true'
        run: npm ci

      - name: Install Vercel CLI
        if: steps.token_check.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Deploy preview
        if: steps.token_check.outputs.configured == 'true'
        run: vercel deploy --token=$VERCEL_TOKEN --yes --force
