name: Scheduled Health Monitor

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check'
        required: false
        default: 'production'

jobs:
  health-check:
    name: API Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Check /api/health endpoint
        id: health
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL || 'https://www.aurevonvc.com' }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "$PRODUCTION_URL/api/health")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT
          echo "HTTP Status: $HTTP_STATUS"
          echo "Response: $BODY"

      - name: Parse missing env vars
        run: |
          BODY='${{ steps.health.outputs.body }}'
          echo "Health check result:"
          echo "$BODY" | python3 << 'PYEOF'
import sys, json
try:
    data = json.loads(sys.stdin.read())
    print(f"Pipeline: {data.get('pipeline', 'unknown')}")
    print(f"Status: {data.get('status', 'unknown')}")
    env = data.get('env_check', {})
    missing = [k for k, v in env.items() if not v]
    configured = [k for k, v in env.items() if v]
    print(f"Configured ({len(configured)}): {', '.join(configured)}")
    print(f"Missing ({len(missing)}): {', '.join(missing)}")
    if missing:
        print(f"\n::warning::MISSING ENV VARS: {', '.join(missing)}")
except Exception as e:
    print(f"Parse error: {e}")
PYEOF

      - name: Check page routes
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL || 'https://www.aurevonvc.com' }}
        run: |
          ROUTES=(
            "$PRODUCTION_URL/"
            "$PRODUCTION_URL/aurevon-re"
            "$PRODUCTION_URL/aurevon-web3"
            "$PRODUCTION_URL/aurevon-nft"
            "$PRODUCTION_URL/merch"
            "$PRODUCTION_URL/portal"
            "$PRODUCTION_URL/operator"
            "$PRODUCTION_URL/api/health"
            "$PRODUCTION_URL/nfts/genesis"
            "$PRODUCTION_URL/nfts/chrome"
            "$PRODUCTION_URL/nfts/ember"
            "$PRODUCTION_URL/nfts/insider"
            "$PRODUCTION_URL/nfts/obsidian"
          )
          ALL_OK=true
          for ROUTE in "${ROUTES[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$ROUTE")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "OK ($STATUS): $ROUTE"
            else
              echo "FAIL ($STATUS): $ROUTE"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = false ]; then
            echo "::error::One or more routes returned non-2xx/3xx status"
            exit 1
          fi

      - name: Fail if health check returned non-200
        if: steps.health.outputs.status != '200'
        run: |
          echo "::error::Health endpoint returned HTTP ${{ steps.health.outputs.status }} (expected 200)"
          echo "::error::Set the PRODUCTION_URL repository variable to override the default URL"
          exit 1
